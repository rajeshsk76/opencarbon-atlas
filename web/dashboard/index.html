<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenCarbon Atlas Dashboard</title>
    <link
      rel="stylesheet"
      href="/dashboard/vendor/leaflet/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="/dashboard/vendor/markercluster/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="/dashboard/vendor/markercluster/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="/dashboard/style.css" />
  </head>
  <body>
    <main class="dashboard">
      <section class="map-panel" aria-label="OpenCarbon Atlas Norway map">
        <div id="map"></div>
      </section>

      <aside class="sidebar" aria-label="Dashboard controls and summary">
        <header class="sidebar-header">
          <p class="eyebrow">Norway industrial facilities</p>
          <h1>OpenCarbon Atlas</h1>
          <p id="summary">Loading Miljødirektoratet facility data...</p>
        </header>

        <section class="filter-bar" aria-label="Map filters">
          <label class="check-filter">
            <input id="activeOnlyFilter" type="checkbox" checked />
            Active only
          </label>
          <label class="check-filter">
            <input id="airOnlyFilter" type="checkbox" checked />
            Air emissions only
          </label>
          <label class="check-filter">
            <input id="closedFilter" type="checkbox" checked />
            Closed facilities
          </label>
        </section>

        <section class="kpi-list" aria-label="Facility summary">
          <article class="kpi-card">
            <span>Total facilities</span>
            <strong id="totalFacilities">--</strong>
          </article>
          <article class="kpi-card">
            <span>Active facilities</span>
            <strong id="activeFacilities">--</strong>
          </article>
          <article class="kpi-card">
            <span>Air emission sources</span>
            <strong id="airEmissionSources">--</strong>
          </article>
          <article class="kpi-card">
            <span>Municipalities</span>
            <strong id="municipalities">--</strong>
          </article>
        </section>

        <section class="legend" aria-label="Marker legend">
          <h2>Marker status</h2>
          <div><span class="legend-dot red"></span>Active air emissions</div>
          <div><span class="legend-dot blue"></span>Active water</div>
          <div><span class="legend-dot grey"></span>Closed</div>
        </section>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet/dist/leaflet.js"
    ></script>
    <script
      src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"
    ></script>
    <script src="/dashboard/dashboard.js"></script>
  </body>
</html>
